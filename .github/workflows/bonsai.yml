name: Generate Bonsai

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  bonsai:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install pybonsai Pillow

      - run: python generate_bonsai.py

      - run: |
          git config user.name "github_bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bonsai.png
          git diff --cached --quiet || git commit -m "Honey wake up, new bonsai just dropped"
          git push
